<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비흡연자의 쉬는시간 - 전 범위 확률 분석기</title>
<style>
    :root {
        --bg: #f4f1ea; --panel: #ffffff; --border: #d1cdc0;
        --accent: #7a8b7c; --gold: #8d7b68; --text: #4a4a4a;
    }
    body { background: var(--bg); font-family: 'Pretendard', sans-serif; color: var(--text); padding: 10px; margin: 0; }
    .container { max-width: 600px; margin: 20px auto; background: var(--panel); border: 1px solid var(--border); border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    h1 { text-align: center; color: var(--gold); font-size: 22px; margin-bottom: 10px; }
    .intro { font-size: 13px; text-align: center; color: #7d7d7d; margin-bottom: 20px; line-height: 1.5; }
    
    .search-box { position: relative; margin-bottom: 20px; }
    #pet-name { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; box-sizing: border-box; font-size: 16px; }
    #suggestions { position: absolute; width: 100%; background: white; border: 1px solid var(--accent); z-index: 100; list-style: none; padding: 0; margin: 0; display: none; max-height: 200px; overflow-y: auto; border-radius: 0 0 12px 12px; }
    #suggestions li { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; }

    #btn-analyze { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 17px; cursor: pointer; transition: 0.2s; }
    #btn-analyze:active { transform: scale(0.98); }

    .result-summary { margin-top: 20px; padding: 15px; background: #fdfcfb; border: 1px solid var(--border); border-radius: 12px; font-size: 14px; display: none; }
    
    .result-list { margin-top: 20px; max-height: 500px; overflow-y: auto; border: 1px solid #eee; border-radius: 12px; }
    .result-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #f0f0f0; font-family: monospace; }
    .result-item:hover { background: #f9f9f9; }
    .stat-val { font-weight: bold; color: #333; font-size: 14px; }
    .prob-tag { color: #e06c75; font-weight: bold; text-align: right; }
    .match-detail { display: block; font-size: 10px; color: #999; font-weight: normal; }

    #loading { display: none; text-align: center; padding: 30px; }
    .spinner { border: 4px solid rgba(0,0,0,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: var(--accent); animation: spin 1s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="container">
    <h1>전 범위 확률 분석기</h1>
    <div class="intro">
        랜덤 보정(-2~+2)과 보너스 포인트(0~10)가 만들어낼 수 있는<br>
        <strong>모든 출현 가능 능력치</strong>와 8등급 확률을 전수조사합니다.
    </div>

    <div class="search-box">
        <input type="text" id="pet-name" placeholder="페트 이름을 입력하세요..." autocomplete="off">
        <ul id="suggestions"></ul>
    </div>

    <button id="btn-analyze">모든 경우의 수 분석 (Deep Scan)</button>

    <div id="loading">
        <div class="spinner"></div>
        <div id="loading-text">데이터 연산 중...</div>
    </div>

    <div id="summary" class="result-summary"></div>
    <div id="result-list" class="result-list"></div>
</div>

<script>
    let petData = {};
    async function loadPetData() {
        try {
            const res = await fetch('pet.json');
            petData = await res.json();
        } catch(e) { console.error("Data Load Error"); }
    }
    loadPetData();

    // 입력 및 자동완성
    const input = document.getElementById('pet-name');
    const sugg = document.getElementById('suggestions');
    input.addEventListener('input', () => {
        const val = input.value;
        sugg.innerHTML = '';
        if(!val) { sugg.style.display='none'; return; }
        Object.keys(petData).filter(n => n.includes(val)).slice(0,10).forEach(n => {
            const li = document.createElement('li');
            li.textContent = n;
            li.onclick = () => { input.value = n; sugg.style.display='none'; };
            sugg.appendChild(li);
        });
        sugg.style.display='block';
    });

    // 메인 분석 로직
    document.getElementById('btn-analyze').onclick = function() {
        const name = input.value;
        if(!petData[name]) return alert("페트를 선택해주세요.");
        
        const pet = petData[name];
        const loading = document.getElementById('loading');
        const resList = document.getElementById('result-list');
        const summary = document.getElementById('summary');

        loading.style.display = 'block';
        resList.innerHTML = '';
        summary.style.display = 'none';

        setTimeout(() => {
            const statsMap = new Map(); // { "H A D G": { total: 0, s8: 0 } }
            const c = pet.initialCoefficient;

            // 1. 모든 랜덤 보정치 조합 루프 (5^4 = 625)
            for(let hr=-2; hr<=2; hr++){
            for(let ar=-2; ar<=2; ar++){
            for(let dr=-2; dr<=2; dr++){
            for(let gr=-2; gr<=2; gr++){
                
                // 2. 모든 보너스 포인트 분배 루프 (286가지)
                for(let hb=0; hb<=10; hb++){
                for(let ab=0; ab<=10; ab++){
                for(let db=0; db<=10; db++){
                    let gb = 10 - hb - ab - db;
                    if(gb < 0 || gb > 10) continue;

                    const ih = ((pet.healthCoefficient + hr + hb) * c) / 100;
                    const ia = ((pet.attackCoefficient + ar + ab) * c) / 100;
                    const id = ((pet.defenseCoefficient + dr + db) * c) / 100;
                    const ig = ((pet.agilityCoefficient + gr + gb) * c) / 100;

                    const finalH = Math.floor(ih * 4 + ia + id + ig);
                    const finalA = Math.floor(ih * 0.1 + ia + id * 0.1 + ig * 0.05);
                    const finalD = Math.floor(ih * 0.1 + ia * 0.1 + id + ig * 0.05);
                    const finalG = Math.floor(ig);

                    const key = `${finalH} ${finalA} ${finalD} ${finalG}`;
                    if(!statsMap.has(key)) statsMap.set(key, { total: 0, s8: 0 });
                    
                    const entry = statsMap.get(key);
                    entry.total += 1;
                    // S8(8등급) 판정 조건: 모든 보정치가 +2인 상태
                    if(hr === 2 && ar === 2 && dr === 2 && gr === 2) entry.s8 += 1;
                }}}}}}}

            // 3. 결과 정렬 및 출력
            const sortedResults = Array.from(statsMap.entries()).sort((a, b) => b[1].s8 / b[1].total - a[1].s8 / a[1].total);
            
            summary.innerHTML = `분석 완료: 총 <strong>${statsMap.size}개</strong>의 서로 다른 능력치 조합이 발견되었습니다. (확률 순 정렬)`;
            summary.style.display = 'block';

            let html = "";
            sortedResults.forEach(([stat, data]) => {
                const prob = ((data.s8 / data.total) * 100).toFixed(2);
                if (data.s8 > 0) { // S8 가능성이 조금이라도 있는 것들만 우선 출력
                    html += `
                    <div class="result-item">
                        <span class="stat-val">${stat}</span>
                        <span class="prob-tag">
                            ${prob}%
                            <span class="match-detail">(S8: ${data.s8} / 전체: ${data.total})</span>
                        </span>
                    </div>`;
                }
            });
            
            resList.innerHTML = html || "<div style='padding:20px; text-align:center;'>8등급이 가능한 조합이 발견되지 않았습니다.</div>";
            loading.style.display = 'none';
        }, 100);
    };
</script>
</body>
</html>
