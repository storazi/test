<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비흡연자의 쉬는시간 - 8등급 전수조사</title>
<style>
    :root {
        --bg: #fdfcf9; --panel: #ffffff; --border: #d1cdc0;
        --accent: #7a8b7c; --gold: #8d7b68; --text: #4a4a4a;
    }
    body { background: var(--bg); font-family: 'Pretendard', sans-serif; color: var(--text); padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    h1 { text-align: center; color: var(--gold); font-size: 20px; margin-bottom: 20px; }
    
    .search-box { position: relative; margin-bottom: 20px; }
    #pet-name { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; box-sizing: border-box; }
    #suggestions { position: absolute; width: 100%; background: white; border: 1px solid var(--accent); z-index: 100; list-style: none; padding: 0; margin: 0; display: none; max-height: 150px; overflow-y: auto; }
    #suggestions li { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; }

    .summary-card { background: #f8f7f2; padding: 15px; border-radius: 12px; margin-bottom: 20px; font-size: 13px; line-height: 1.6; border-left: 4px solid var(--gold); }
    
    .result-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
    .result-table th { background: #eee; padding: 10px; border: 1px solid var(--border); }
    .result-table td { padding: 10px; border: 1px solid var(--border); text-align: center; font-family: 'Consolas', monospace; }
    .result-table tr:hover { background: #f9f9f9; }
    
    #btn-gen { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
    .prob-text { color: #e06c75; font-weight: bold; font-size: 14px; }
    .count-text { font-size: 11px; color: #999; margin-left: 5px; }
</style>
</head>
<body>

<div class="container">
    <h1>8등급 능력치 조합 및 출현 확률</h1>
    
    <div class="search-box">
        <input type="text" id="pet-name" placeholder="페트 이름을 입력하세요..." autocomplete="off">
        <ul id="suggestions"></ul>
    </div>

    <button id="btn-gen">8등급 전수조사 및 확률 분석</button>

    <div id="summary" class="summary-card" style="display:none;"></div>

    <div id="result-list">
        <table class="result-table" id="res-table" style="display:none;">
            <thead>
                <tr>
                    <th>순위</th>
                    <th>능력치 (HP Atk Def Agi)</th>
                    <th>출현 확률</th>
                </tr>
            </thead>
            <tbody id="res-body"></tbody>
        </table>
    </div>
</div>

<script>
    let petData = {};
    async function load() {
        const res = await fetch('pet.json');
        petData = await res.json();
    }
    load();

    const input = document.getElementById('pet-name');
    const sugg = document.getElementById('suggestions');

    input.addEventListener('input', () => {
        const val = input.value;
        sugg.innerHTML = '';
        if(!val) { sugg.style.display='none'; return; }
        Object.keys(petData).filter(n => n.includes(val)).slice(0,5).forEach(n => {
            const li = document.createElement('li');
            li.textContent = n;
            li.onclick = () => { input.value = n; sugg.style.display='none'; };
            sugg.appendChild(li);
        });
        sugg.style.display='block';
    });

    document.getElementById('btn-gen').onclick = () => {
        const name = input.value;
        if(!petData[name]) return alert("페트를 선택해주세요.");
        
        const pet = petData[name];
        const resBody = document.getElementById('res-body');
        const summary = document.getElementById('summary');
        resBody.innerHTML = '';

        // 8등급 고정 조건: 모든 랜덤 보정치 hr, ar, dr, gr = 2
        const hr = 2, ar = 2, dr = 2, gr = 2;
        const c = pet.initialCoefficient;
        
        const statsCountMap = new Map(); // { "H A D G": count }
        let totalCount = 0;

        // 보너스 포인트 10점의 모든 분배 경우의 수 탐색 (총 286가지)
        for (let hb = 0; hb <= 10; hb++) {
            for (let ab = 0; ab <= 10; ab++) {
                for (let db = 0; db <= 10; db++) {
                    let gb = 10 - hb - ab - db;
                    if (gb < 0 || gb > 10) continue;

                    const ih = ((pet.healthCoefficient + hr + hb) * c) / 100;
                    const ia = ((pet.attackCoefficient + ar + ab) * c) / 100;
                    const id = ((pet.defenseCoefficient + dr + db) * c) / 100;
                    const ig = ((pet.agilityCoefficient + gr + gb) * c) / 100;

                    const finalH = Math.floor(ih * 4 + ia + id + ig);
                    const finalA = Math.floor(ih * 0.1 + ia + id * 0.1 + ig * 0.05);
                    const finalD = Math.floor(ih * 0.1 + ia * 0.1 + id + ig * 0.05);
                    const finalG = Math.floor(ig);

                    const key = `${finalH} ${finalA} ${finalD} ${finalG}`;
                    statsCountMap.set(key, (statsCountMap.get(key) || 0) + 1);
                    totalCount++;
                }
            }
        }

        // 확률 순으로 정렬
        const sortedStats = Array.from(statsCountMap.entries()).sort((a, b) => b[1] - a[1]);

        summary.innerHTML = `<strong>${name}</strong> 8등급 분석:<br>분배 가능한 286가지 포인트 조합 중, 서로 다른 <strong>${statsCountMap.size}가지</strong>의 능력치 세트가 발견되었습니다. (확률 순 정렬)`;
        summary.style.display = 'block';
        document.getElementById('res-table').style.display = 'table';

        sortedStats.forEach(([stat, count], idx) => {
            const prob = ((count / totalCount) * 100).toFixed(2);
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${idx + 1}</td>
                <td><strong>${stat}</strong></td>
                <td>
                    <span class="prob-text">${prob}%</span>
                    <span class="count-text">(${count}/286)</span>
                </td>
            `;
            resBody.appendChild(tr);
        });
    };
</script>
</body>
</html>
